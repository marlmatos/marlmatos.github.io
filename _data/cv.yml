- title: Experience
  type: time_table
  contents:
    - title: Functional Genomics Postdoctoral Associate
      institution: New York Genome Center, New York, NY
      year: March 2026 - present
      description:
        - Expand machine learning approaches for functional variant prioritization through evaluation and integration of complementary predictive methods.
        - Build integrative analyses combining functional genomics and CRISPR perturbation data to improve variant-to-gene mapping and causal mechanism prioritization.
    - title: Human Genetics Researcher (PhD research, with New York Genome Center from 2022)
      institution: Albert Einstein College of Medicine, Bronx, NY
      year: August 2019 - February 2026
      description:
        - Led a cohort-scale human genetics study in primary CD4+ T cells, generating a pan-CD4+ T-cell multi-omic map of regulatory mechanisms underlying immune phenotypes, age-associated variation, and disease-relevant biology.
        - Identified and prioritized thousands of regulatory variants via molecular QTL mapping across 46 immune-mediated diseases and traits.
        - Trained and benchmarked sequence-based machine learning models of regulatory activity against empirical QTL data.
        - Developed scalable computational workflows for cohort-level multi-omic preprocessing and integrative analysis.
    - title: Functional Genetics and Stem Cell Researcher
      institution: Icahn School of Medicine at Mount Sinai, New York, NY
      year: August 2017 - July 2019
      description:
        - Investigated molecular and cellular effects of disease-associated genetic variants using stem-cell and gene-editing approaches.
        - Standardized experimental workflows, data collection, and analysis practices across studies.

